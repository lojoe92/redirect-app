# Add this server block to your nginx config on the Google Cloud instance.
# Typically: /etc/nginx/sites-available/redirects.sweetsmilingsoul.com
# Then symlink: ln -s /etc/nginx/sites-available/redirects.sweetsmilingsoul.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name redirects.sweetsmilingsoul.com;

    # After running certbot, it will automatically update this file for HTTPS.
    # Run: sudo certbot --nginx -d redirects.sweetsmilingsoul.com

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
